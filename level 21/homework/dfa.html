<!-- Table გამოიყენება მონაცემებისთვის სადაც  არიან სვეტები და რიგები -->
<!-- tr - ეს არის რიგი table row რომელიც შეიცავს td table data ელემენტებს -->

<table border="1">
    <thead>
        <tr>
            <!-- th ქმნის თავიანთ სვეტებს (header columns) -->
            <th>s 1</th>
            <th>s 2</th>
            <th>s 3</th>
        </tr>
    </thead>
    <tbody>
        <!-- tr ქმნის რიგებს, სადაც td არის ცალკეული სვეტი -->
        <tr>
            <td>s 1, r 1</td>
            <td> s1, r 2</td>
            <td>s 1, r3</td>
        </tr>
        <tr>
            <td>r 2, s 1</td>
            <td>r 2, s 2</td>
            <td>r 2, s 3</td>
        </tr>
    </tbody>
</table>
