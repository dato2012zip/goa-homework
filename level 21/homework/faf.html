<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Change Example</title>
    <style>
        .color-change p {
            color: red; 
        }
    </style>
</head>
<body>
    <div class="color-change">
        <p> 1</p>
        <p> 2</p>
        <p>3</p>
        <p> 4</p>
        <p> 5</p>
    </div>
</body>
</html>

<!-- div არის კონტეინერი, რომელიც გამოიყენება სხვა ჰტმლ ელემენტების ჯგუფირებისათვის -->
<!-- იგი არ ახდენს სტილის ცვლილებას, უბრალოდ ჯგუფირებს სხვა ელემენტებს ერთ ადგილას -->
<!-- div-ი ხშირად გამოიყენება ლეიაუტის შექმნისას, განსაკუთრებით ცსს-ით სტილიზაციისთვის -->
#2
<div class="container">
    <!-- სხვა ელემენტები შეიძლება ამ div-ის შიგნით მოათავსოთ -->
    <p>ეს არის პეიჯის ნაწილები</p>
</div>
